# Namespace that d2k is deployed into. Change this to your target namespace.
# If the namespace doesn't exist, d2k will create it on startup.
# Note: d2k does not need to be in the same namespace as your workloads,
# but it's simplest to manage if it is.
apiVersion: v1
kind: Namespace
metadata:
  name: d2k   # change to your target namespace
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged
---
# ServiceAccount that d2k runs as. Bound to the namespace Role below for
# workload management, and to the ClusterRole below for read-only node access.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: d2k
  namespace: d2k   # change to your target namespace
  labels:
    app: d2k

---
# Role grants d2k the minimum permissions it needs to manage workloads
# within the target namespace only.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: d2k
  namespace: d2k   # change to your target namespace
rules:
  # Deployments — core workload primitive
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Pods — for log streaming and exec
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "watch", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]

  # Services — created alongside Deployments for port mappings
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "watch", "list", "create", "update", "patch", "delete"]

  # ConfigMaps — used for swarm identity (d2k-identity) and swarm configs
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Secrets — used for swarm secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # PersistentVolumeClaims — docker volume create/rm
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "watch", "list", "create", "delete"]

  # Namespaces — read-only, used for cluster UID derivation and connectivity check
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get"]

  # ResourceQuotas — read-only, used to inject requests.cpu/memory when the
  # namespace quota enforces them (Docker has no concept of ResourceQuotas)
  - apiGroups: [""]
    resources: ["resourcequotas"]
    verbs: ["get", "list"]

  # Metrics — optional, used for docker stats
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]

  # Events — read-only, used for docker events history
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]

---
# RoleBinding ties the namespace-scoped Role to the ServiceAccount.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: d2k
  namespace: d2k   # change to your target namespace
subjects:
  - kind: ServiceAccount
    name: d2k
    namespace: d2k   # change to your target namespace
roleRef:
  kind: Role
  name: d2k
  apiGroup: rbac.authorization.k8s.io

---
# ClusterRole grants read-only access to nodes across the cluster.
# Nodes are a cluster-scoped resource and cannot be granted via a namespaced Role.
# Required for: SwarmListNodes, SwarmInspectNode, and leader election in /info
# (matching the API server host to a control-plane node IP).
# Node state changes (drain/pause/active) and label mutations are intentionally
# blocked — d2k is a workload consumption tool, not a cluster administration tool.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d2k-node-reader
  labels:
    app: d2k
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]

---
# ClusterRoleBinding ties the node ClusterRole to the d2k ServiceAccount.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d2k-node-reader
  labels:
    app: d2k
subjects:
  - kind: ServiceAccount
    name: d2k
    namespace: d2k   # change to your target namespace
roleRef:
  kind: ClusterRole
  name: d2k-node-reader
  apiGroup: rbac.authorization.k8s.io

---
# Deployment running d2k itself inside the target namespace.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: d2k
  namespace: d222k   # change to your target namespace
  labels:
    app: d2k
spec:
  replicas: 1
  selector:
    matchLabels:
      app: d2k
  template:
    metadata:
      labels:
        app: d2k
    spec:
      serviceAccountName: d2k
      volumes:
        # TLS Secret mount — optional. If the d2k-tls Secret does not exist,
        # the mount is silently skipped and d2k listens on port 2375 without TLS.
        # To enable TLS:
        #   kubectl create secret tls d2k-tls --cert=server.crt --key=server.key -n d2k
        #   kubectl rollout restart deployment/d2k -n d2k
        # d2k will then listen on port 2376 with TLS automatically.
        - name: tls
          secret:
            secretName: d2k-tls
            optional: true
      containers:
        - name: d2k
          image: portainer/d2k:latest   # replace with your image
          imagePullPolicy: Always
          ports:
            - containerPort: 2375
          env:
            - name: D2K_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: D2K_PORT
              value: "2375"
            - name: D2K_SWARM_MODE
              value: "true"   # set to "false" to run in Docker host mode instead
            - name: D2K_LOG_LEVEL
              value: "info"
            # D2K_KUBECONFIG is intentionally not set — in-cluster auth is used.
            # D2K_TLS_CERT_FILE and D2K_TLS_KEY_FILE are not set here — they
            # default to /etc/d2k/tls/tls.crt and /etc/d2k/tls/tls.key which
            # are populated by the d2k-tls volume mount below if the Secret exists.
          volumeMounts:
            - name: tls
              mountPath: /etc/d2k/tls
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

---
# OPTION A — LoadBalancer Service
# Use this when your cluster has a cloud load balancer controller or a bare-metal
# equivalent (e.g. MetalLB). The controller assigns an external IP automatically.
# Connect Portainer to: tcp://<EXTERNAL-IP>:2375 (no TLS) or tcp://<EXTERNAL-IP>:2376 (TLS)
# Update the port value below to 2376 if TLS is configured.
# Delete this section if you are using the NodePort option below.
apiVersion: v1
kind: Service
metadata:
  name: d2k
  namespace: d2k   # change to your target namespace
  labels:
    app: d2k
spec:
  selector:
    app: d2k
  ports:
    - name: docker-api
      port: 2375
      targetPort: 2375
  type: LoadBalancer

---
# OPTION B — NodePort Service
# Use this when your cluster does not have a load balancer controller (e.g. bare
# metal, on-prem, or single-node clusters). The Docker API is reachable on every
# node at the assigned NodePort (30000-32767 range, assigned by Kubernetes).
# Connect Portainer to: tcp://<ANY-NODE-IP>:<NODE-PORT>:2375
# You can pin the NodePort to a specific value by uncommenting nodePort below.
# Delete this section if you are using the LoadBalancer option above.
#
# apiVersion: v1
# kind: Service
# metadata:
#   name: d2k
#   namespace: d2k   # change to your target namespace
#   labels:
#     app: d2k
# spec:
#   selector:
#     app: d2k
#   ports:
#     - name: docker-api
#       port: 2375
#       targetPort: 2375
#       # nodePort: 32375   # uncomment to pin to a specific port
#   type: NodePort
