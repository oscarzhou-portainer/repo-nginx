apiVersion: apps/v1
kind: Deployment
metadata:
  name: repro-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: repro-app
  template:
    metadata:
      labels:
        app: repro-app
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - name: http
              containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: repro-service
  namespace: default
spec:
  selector:
    app: repro-app
  ports:
    - name: http        # named port, no numeric equivalent required here
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: repro-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx   # adjust/remove for your controller
spec:
  rules:
    - host: repro.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: repro-service
                port:
                  name: http   # named reference — Number is 0, this triggers the bug
