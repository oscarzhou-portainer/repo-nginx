version: "3.8"

services:
  log-generator:
    image: busybox
    container_name: log-generator
    command:
      - sh
      - -c
      - |
        i=1
        while true; do
          printf "[%s] log #%d\n" "$$(date +%Y-%m-%dT%H:%M:%S)" "$$i"
          i=$$((i + 1))
          sleep 2
        done
